<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            /* 4 equal columns */
            grid-template-rows: repeat(3, 100px);
            /* 3 equal rows */
            gap: 10px;
        }

        .grid>div {
            display: grid;
            place-items: center;
            background: crimson;
            color: white;
            font-size: 4rem;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="header">
            <h2>Header</h2>
        </div>
        <div class="sidebar-left">
            <h2>Left Sidebar</h2>
        </div>
        <div class="main">
            <h2>Main Content</h2>
        </div>
        <div class="sidebar-right">
            <h2>Right Sidebar</h2>
        </div>
        <div class="footer">
            <h2>Footer</h2>
        </div>
    </div>
</body>

</html>
