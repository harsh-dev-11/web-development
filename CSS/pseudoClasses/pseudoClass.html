<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Class</title>
    <link rel="stylesheet" href="pseudoClass.css">
</head>

<body>
    <main>
        <h1>Pseudo classes demonstration</h1>
        <div class="container">
            <button><a id="temp" href="https://www.google.com" target="_blank">Click Here!</a></button>
        </div>

        <div class="second">
            <form>
                <h2>Enter the details</h2>
                <label for="firstInput">Enter something</label>
                <input id="firstInput" type="text" placeholder="enter something">
                <br>
                <label for="secondInput">Required Field</label>
                <input id="secondInput" type="text" placeholder="default" disabled>
            </form>
        </div>

        <div class="footer"></div>
    </main>
</body>

</html>
