<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">
    <style>
        h1 {
            font-family: serif;
            font-weight: 450;
            /* font-style: oblique; */
            text-align: center;
            font-size: 2.4rem;
        }

        h2 {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }

        p {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: 100;

        }
    </style>
</head>

<body>
    <h1>Typography</h1>
    <p>It is really very interesting to read the better text that has better fonts.</p>

    <h2>History of Typography</h2>
    <p>
        With the help of various font-families and the font-cutomization, we can make the websites more readable and
        userfriendly when it comes to convey messages and information
    </p>
</body>

</html>
