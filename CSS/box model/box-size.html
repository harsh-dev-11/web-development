<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        #box1 {
            box-sizing: content-box;
            height: 200px;
            width: 300px;
            margin: 20px;
            padding: 20px;
            border: 2px solid black;
            background-color: lightgreen;
        }

        #box2 {
            box-sizing: border-box;
            height: 200px;
            width: 300px;
            margin: 20px;
            padding: 20px;
            border: 2px solid black;
            background-color: rgb(231, 250, 187);
        }
    </style>
</head>

<body>
    <div id="box1"></div>
    <div id="box2"></div>
</body>

</html>
