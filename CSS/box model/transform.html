<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform property</title>
    <style>
        body {
            background: rgb(237, 201, 155);
        }

        h1 {
            margin-top: -18px;
            text-align: center;
        }

        .container {
            background-color: rgb(234, 255, 234);
            height: 85vh;
            width: 90%;
            padding: 20px;
            border: 2px solid black;
            margin: auto auto;
        }

        .container div {
            border: 1px solid blue;
            display: inline-block;
            margin: 90px 60px;
            height: 150px;
            width: 150px;
        }

        .first {
            background: rgb(210, 83, 83);
        }

        .first:hover {
            transform: translateX(80px);
            transition: 0.7s ease;
        }

        .second {
            background: rgb(242, 242, 169);
        }

        .second:hover {
            transform: translatey(80px);
            transition: 0.7s ease;
        }

        .third {
            background: rgb(236, 157, 236);
        }

        .third:hover {
            transform: rotate(180deg);
            transition: 0.6s ease;
        }

        .fourth {
            background: rgb(121, 121, 234);
        }

        .fourth:hover {
            transform: scale(1.2);
            transition: 0.6s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Transformations</h1>
        <div class="first"></div>
        <div class="second"></div>
        <div class="third"></div>
        <div class="fourth"></div>
    </div>
</body>

</html>
