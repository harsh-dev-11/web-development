<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>play cards</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main id="playing-cards">

        <div class="card" id="first-card">
            <div class="left">
                <p>A</p>
                <p>♠</p>
            </div>
            <div class="middle">
                <p>♠</p>
            </div>
            <div class="right">
                <p class="flipped">♠</p>
                <p class="flipped">A</p>
            </div>
        </div>

        <div class="card" id="second-card">
            <div class="left">
                <p>2</p>
                <p>♣</p>
            </div>
            <div class="middle">
                <p>♣</p>
                <p class="flipped">♣</p>
            </div>
            <div class="right">
                <p class="flipped">♣</p>
                <p class="flipped">2</p>
            </div>
        </div>

        <div class="card" id="third-card">
            <div class="left">
                <p>3</p>
                <p>♥</p>
            </div>
            <div class="middle">
                <p>♥</p>
                <p>♥</p>
                <p class="flipped">♥</p>
            </div>
            <div class="right">
                <p class="flipped">♥</p>
                <p class="flipped">3</p>
            </div>
        </div>
        <!-- <div class="cards">
            <div class="left"></div>
            <div class="middle"></div>
            <div class="right"></div>
        </div>
        <div class="cards">
            <div class="left"></div>
            <div class="middle"></div>
            <div class="right"></div>
        </div> -->
    </main>
</body>

</html>
