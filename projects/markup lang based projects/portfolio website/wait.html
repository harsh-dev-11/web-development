<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction | Harsh's Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    /* --- CUSTOMIZATION VARIABLES --- */
    :root {
      /* light themed background + readable dark text */
      --primary-color: #0b1a2b;
      /* main text (dark) */
      --secondary-color: #4a5566;
      /* muted text / meta */
      --highlight-color: #0077cc;
      /* accent / CTAs */
      --background-gradient-start: #f7fbff;
      /* very light */
      --background-gradient-end: #e6f3ff;
      /* light blue */
    }

    /* ----------------------------- */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--background-gradient-start), var(--background-gradient-end));
      color: var(--primary-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      width: 100%;
      padding: 36px 20px;
      background-color: rgba(255, 255, 255, 0.92);
      /* lighter card */
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(11, 26, 43, 0.08);
      border: 1px solid rgba(11, 26, 43, 0.06);
      color: var(--primary-color);
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      color: var(--primary-color);
    }

    .subtitle {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--highlight-color);
      margin-bottom: 18px;
    }

    p {
      font-size: 1rem;
      color: var(--secondary-color);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    #countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .time-unit {
      background: rgba(11, 26, 43, 0.04);
      padding: 12px 16px;
      border-radius: 8px;
      width: 86px;
      border: 1px solid rgba(11, 26, 43, 0.06);
    }

    .time-unit span {
      display: block;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .time-unit small {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--secondary-color);
      letter-spacing: 1px;
    }

    .social-links h3 {
      font-weight: 500;
      margin-bottom: 16px;
      color: var(--secondary-color);
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .social-icons a {
      color: var(--primary-color);
      font-size: 1.6rem;
      transition: color 0.2s ease, transform 0.2s ease;
      opacity: 0.9;
    }

    .social-icons a:hover {
      color: var(--highlight-color);
      transform: translateY(-4px);
      opacity: 1;
    }

    /* Responsive tweaks (unchanged logic) */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .subtitle {
        font-size: 1.05rem;
      }

      p {
        font-size: 0.95rem;
      }

      #countdown {
        gap: 10px;
      }

      .time-unit {
        width: 68px;
        padding: 8px 10px;
      }

      .time-unit span {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Harsh Dhiman</h1>

    <div class="subtitle">My New Portfolio is Coming Soon</div>

    <p>Big things are brewing! A brand-new portfolio is in the works, packed with the latest projects and skills worth
      checking out. Get ready for the reveal.</p>

    <div id="countdown">
      <div class="time-unit">
        <span id="days">00</span>
        <small>Days</small>
      </div>
      <div class="time-unit">
        <span id="hours">00</span>
        <small>Hours</small>
      </div>
      <div class="time-unit">
        <span id="minutes">00</span>
        <small>Minutes</small>
      </div>
      <div class="time-unit">
        <span id="seconds">00</span>
        <small>Seconds</small>
      </div>
    </div>

    <div class="social-links">
      <h3>Get in touch & stay updated:</h3>
      <div class="social-icons">
        <a href="https://www.linkedin.com/in/harsh7044/" target="_blank" aria-label="LinkedIn"><i
            class="fab fa-linkedin"></i></a>
        <a href="https://github.com/h-dhiman08" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://x.com/h_dhiman08" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="mailto:harshdhiman7044@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
      </div>
    </div>

  </div>

  <script>
    // --- CUSTOMIZATION: Set your launch date here ---
    // Format: "Month Day, Year HH:MM:SS" e.g., "Jan 1, 2026 00:00:00"
    const launchDate = new Date("Oct 26, 2025 00:00:00").getTime();
    // ------------------------------------------------

    const countdownFunction = setInterval(function () {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance < 0) {
        clearInterval(countdownFunction);
        document.getElementById("countdown").innerHTML = "<h2>We're Live!</h2>";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      // Add leading zero if number is less than 10
      const format = (num) => (num < 10 ? '0' + num : num);

      document.getElementById("days").innerText = format(days);
      document.getElementById("hours").innerText = format(hours);
      document.getElementById("minutes").innerText = format(minutes);
      document.getElementById("seconds").innerText = format(seconds);

    }, 1000);
  </script>

</body>

</html>
