<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link States</title>
    <style>
        body {
            background-color: black;
        }

        a:active {
            color: azure;
        }

        a:hover {
            color: rgb(24, 246, 50);
        }

        a:focus {
            color: rgb(255, 0, 255);
        }
    </style>
</head>

<body>
    <h1>Various Link States</h1>
    <a href="https://www.google.com" target="_blank">Google</a>
</body>

</html>
