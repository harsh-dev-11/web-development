<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <button class="button" id="theme-switcher-button" aria-haspopup="true" aria-expanded="false"
        aria-controls="theme-dropdown">Switch Theme
        <svg fill="currentColor" viewBox="0 0 24 24" class="icon">
            <path clip-rule="evenodd"
                d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm4.28 10.28a.75.75 0 000-1.06l-3-3a.75.75 0 10-1.06 1.06l1.72 1.72H8.25a.75.75 0 000 1.5h5.69l-1.72 1.72a.75.75 0 101.06 1.06l3-3z"
                fill-rule="evenodd"></path>
        </svg>
    </button>

    <ul id="theme-dropdown" role="menu" aria-labelledby="theme-switcher-button" hidden>
        <li role="menuitem" id="theme-nimbus">nimbus</li>
        <li role="menuitem" id="theme-graphite">graphite</li>
    </ul>
    <div aria-live="polite" hidden id="theme-applied-message">Theme changed successfully!</div>
    <script src="./script.js"></script>
</body>

</html>
