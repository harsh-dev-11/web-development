<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Drum Machine</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Sigmar+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="drum-machine">
        <div id="pad-bank">
            <div class="drum-pad" id="key-Q">Q
                <audio src="" class="clip" id="Q"></audio>
            </div>
            <div class="drum-pad" id="key-W">W
                <audio src="" class="clip" id="W"></audio>
            </div>
            <div class="drum-pad" id="key-E">E
                <audio src="" class="clip" id="E"></audio>
            </div>
            <div class="drum-pad" id="key-A">A
                <audio src="" class="clip" id="A"></audio>
            </div>
            <div class="drum-pad" id="key-S">S
                <audio src="" class="clip" id="S"></audio>
            </div>
            <div class="drum-pad" id="key-D">D
                <audio src="" class="clip" id="D"></audio>
            </div>
            <div class="drum-pad" id="key-Z">Z
                <audio src="" class="clip" id="Z"></audio>
            </div>
            <div class="drum-pad" id="key-X">X
                <audio src="" class="clip" id="X"></audio>
            </div>
            <div class="drum-pad" id="key-C">C
                <audio src="" class="clip" id="C"></audio>
            </div>
        </div>
        <p id="display">-----</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
