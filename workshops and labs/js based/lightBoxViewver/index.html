<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
</head>

<body>
    <h1>Museum Gallery
    </h1>
    <div class="gallery">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="Stonehenge picture"
            class="gallery-item" id="firstImage">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="Storm picture"
            class="gallery-item" id="secondImage">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg
" alt="Tree picture" class="gallery-item" id="thirdImage">
    </div>

    <div class="lightbox">
        <img src="" alt="" id="lightbox-image">
        <button id="close-btn">&times;</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
